<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="crop-bg">

<div class="container">
    <h1>Crop Recommendation System</h1>

    <form action="/predict" method="POST">

        <input type="number" name="N" placeholder="Nitrogen"
            value="{{ values.N if values else '' }}" required>

        <input type="number" name="P" placeholder="Phosphorous"
            value="{{ values.P if values else '' }}" required>

        <input type="number" name="K" placeholder="Potassium"
            value="{{ values.K if values else '' }}" required>

        <input type="number" step="any" name="temperature" placeholder="Temperature"
            value="{{ values.temperature if values else '' }}" required>

        <input type="number" step="any" name="humidity" placeholder="Humidity"
            value="{{ values.humidity if values else '' }}" required>

        <input type="number" step="any" name="ph" placeholder="pH Value"
            value="{{ values.ph if values else '' }}" required>

        <input type="number" step="any" name="rainfall" placeholder="Rainfall"
            value="{{ values.rainfall if values else '' }}" required>
            
        <button type="submit">Predict Crop</button>
        <button type="button" onclick="clearForm()">Clear</button>
    </form>

    <h2 id="result">{{ prediction_text }}</h2>

    <br>
    <a href="/">Go Home</a>
</div>

<script>
document.querySelector("form").addEventListener("input", function() {
    document.getElementById("result").innerHTML = "";
});

function clearForm() {
    window.location.href = "/findyourcrop";
}
</script>
</body>
</html>
